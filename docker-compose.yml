services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    network_mode: host
    volumes:
      - ./ha_config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:stable
    network_mode: host
    volumes:
      - ./esphome_config:/config
      - /etc/localtime:/etc/localtime:ro
    # Optional: for USB flashing from the server, pass through serial devices.
    # You can either map specific devices (preferred) or run privileged.
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    # privileged: true
    restart: unless-stopped
